<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하늘청소년부 게시판</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sky: #4f9cf9; --sky-light: #e8f3ff; --sky-dark: #2563eb;
  --mint: #34d399; --mint-light: #d1fae5;
  --coral: #f87171; --coral-light: #fee2e2;
  --yellow: #fbbf24; --yellow-light: #fef3c7;
  --purple: #a78bfa; --purple-light: #ede9fe;
  --bg: #f0f7ff; --surface: #ffffff;
  --border: #dbeafe; --border2: #bfdbfe;
  --txt: #1e3a5f; --txt2: #4b6a8a; --txt3: #8aaac8;
  --r: 16px; --r-sm: 10px; --r-xs: 6px;
  --shadow: 0 2px 8px rgba(79,156,249,0.1);
  --shadow-md: 0 6px 20px rgba(79,156,249,0.15);
  --shadow-lg: 0 12px 40px rgba(79,156,249,0.2);
}
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--txt); font-size: 14px; line-height: 1.6; min-height: 100vh;
}
.header {
  background: white; border-bottom: 2px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(79,156,249,0.1);
}
.header-inner {
  max-width: 1100px; margin: 0 auto; padding: 0 1.5rem;
  height: 62px; display: flex; align-items: center; justify-content: space-between;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900;
  color: var(--sky-dark); text-decoration: none;
}
.logo-icon {
  width: 36px; height: 36px; border-radius: 12px;
  background: linear-gradient(135deg, var(--sky), var(--sky-dark));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; box-shadow: 0 3px 8px rgba(79,156,249,0.35);
}
.header-right { display: flex; align-items: center; gap: 8px; }
.hero {
  background: linear-gradient(135deg, #1d4ed8 0%, #4f9cf9 55%, #34d399 100%);
  padding: 2.5rem 1.5rem; text-align: center; position: relative; overflow: hidden;
}
.hero-title {
  font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 900;
  color: white; margin-bottom: 6px; position: relative;
}
.hero-sub { font-size: 14px; color: rgba(255,255,255,0.88); position: relative; font-weight: 500; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--r-sm);
  font-size: 13px; font-family: inherit; font-weight: 700;
  cursor: pointer; border: none; transition: all 0.18s; white-space: nowrap;
}
.btn-sky { background: var(--sky); color: white; box-shadow: 0 3px 10px rgba(79,156,249,0.35); }
.btn-sky:hover { background: var(--sky-dark); transform: translateY(-1px); }
.btn-outline { background: white; color: var(--sky); border: 2px solid var(--sky); }
.btn-outline:hover { background: var(--sky-light); }
.btn-coral { background: var(--coral); color: white; box-shadow: 0 2px 8px rgba(248,113,113,0.3); }
.btn-coral:hover { background: #ef4444; transform: translateY(-1px); }
.btn-mint { background: var(--mint); color: white; box-shadow: 0 2px 8px rgba(52,211,153,0.3); }
.btn-mint:hover { background: #10b981; }
.btn-ghost { background: transparent; color: var(--txt2); border: 2px solid var(--border2); }
.btn-ghost:hover { background: var(--sky-light); border-color: var(--sky); color: var(--sky); }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-lg { padding: 11px 22px; font-size: 15px; border-radius: var(--r); }
.container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
.stat {
  background: white; border-radius: var(--r); padding: 16px 18px;
  box-shadow: var(--shadow); border: 2px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  transition: transform 0.18s, box-shadow 0.18s;
}
.stat:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.stat-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.stat-label { font-size: 11px; color: var(--txt3); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
.stat-value { font-family: 'Nunito', sans-serif; font-size: 26px; font-weight: 900; color: var(--txt); line-height: 1.1; }
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
.search-wrap { flex: 1; min-width: 180px; position: relative; }
.search-wrap input {
  width: 100%; padding: 10px 14px 10px 38px;
  border: 2px solid var(--border2); border-radius: var(--r-sm);
  background: white; font-family: inherit; font-size: 13px;
  color: var(--txt); outline: none; transition: all 0.18s; font-weight: 500;
}
.search-wrap input:focus { border-color: var(--sky); box-shadow: 0 0 0 3px rgba(79,156,249,0.12); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; }
.tab-wrap { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.tab {
  padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
  cursor: pointer; border: 2px solid var(--border2); background: white;
  color: var(--txt2); transition: all 0.18s; font-family: inherit;
}
.tab:hover { border-color: var(--sky); color: var(--sky); background: var(--sky-light); }
.tab.active { background: var(--sky); color: white; border-color: var(--sky); box-shadow: 0 3px 8px rgba(79,156,249,0.3); }
.tab-secret { border-color: var(--yellow) !important; color: #b45309 !important; }
.tab-secret.active { background: var(--yellow) !important; color: white !important; border-color: var(--yellow) !important; }
.admin-bar {
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  border: 2px solid var(--yellow); border-radius: var(--r); padding: 10px 16px;
  margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between;
}
.admin-label { font-size: 13px; color: #92400e; font-weight: 700; }
.write-panel {
  background: white; border: 2px solid var(--border2);
  border-radius: var(--r); padding: 1.5rem; margin-bottom: 1.5rem;
  box-shadow: var(--shadow-md); animation: slideDown 0.2s ease;
}
@keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
.write-title { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; margin-bottom: 1.25rem; color: var(--txt); }
.field { margin-bottom: 14px; }
.field label { font-size: 12px; color: var(--txt2); font-weight: 700; display: block; margin-bottom: 5px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 10px 14px;
  border: 2px solid var(--border2); border-radius: var(--r-sm);
  background: var(--bg); font-family: inherit; font-size: 13px;
  color: var(--txt); outline: none; transition: all 0.18s; font-weight: 500;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--sky); background: white; box-shadow: 0 0 0 3px rgba(79,156,249,0.12);
}
.field textarea { resize: vertical; min-height: 100px; line-height: 1.7; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.secret-toggle {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-radius: var(--r-sm); border: 2px solid var(--border2);
  cursor: pointer; font-size: 13px; color: var(--txt2); font-weight: 700;
  transition: all 0.18s; user-select: none; background: var(--bg);
}
.secret-toggle:hover { border-color: var(--coral); color: var(--coral); background: var(--coral-light); }
.secret-toggle.on { border-color: var(--coral); color: var(--coral); background: var(--coral-light); }
.secret-toggle input { width: 15px; height: 15px; accent-color: var(--coral); }
.write-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; padding-top: 16px; border-top: 2px solid var(--border); }
.posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
.post-card {
  background: white; border: 2px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  box-shadow: var(--shadow); transition: all 0.2s;
  display: flex; flex-direction: column;
}
.post-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--border2); }
.post-card.secret-card { border-color: #fca5a5; }
.card-top { height: 6px; }
.card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
.card-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge-secret { background: var(--coral-light); color: #b91c1c; }
.card-title { font-size: 15px; font-weight: 700; color: var(--txt); margin-bottom: 8px; line-height: 1.45; }
.card-content {
  font-size: 13px; color: var(--txt2); line-height: 1.65; flex: 1; margin-bottom: 12px;
  overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
}
.card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 2px solid var(--border); }
.card-meta { font-size: 11px; color: var(--txt3); font-weight: 600; }
.empty { text-align: center; padding: 5rem 1rem; }
.empty-emoji { font-size: 52px; margin-bottom: 14px; }
.empty-text { font-size: 15px; color: var(--txt3); font-weight: 700; }
.loading { text-align: center; padding: 4rem; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--sky); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--txt3); font-weight: 600; }
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(30,58,95,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; padding: 1rem; animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.modal {
  background: white; border-radius: var(--r); padding: 1.75rem;
  width: 100%; max-width: 420px;
  box-shadow: var(--shadow-lg); border: 2px solid var(--border2);
  animation: popIn 0.2s ease;
}
.modal-lg { max-width: 560px; }
@keyframes popIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
.modal-title { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 900; margin-bottom: 1.25rem; color: var(--txt); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
.error-msg { font-size: 12px; color: var(--coral); margin-top: 5px; display: none; font-weight: 700; }
.hint-box { margin-top: 12px; padding: 10px 14px; background: var(--sky-light); border-radius: var(--r-sm); font-size: 12px; color: var(--sky-dark); font-weight: 600; }
.cat-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; max-height: 260px; overflow-y: auto; }
.cat-item { display: flex; align-items: center; gap: 10px; background: var(--bg); border: 2px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px; }
.cat-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.cat-name { flex: 1; font-size: 13px; font-weight: 700; color: var(--txt); }
.cat-key { font-size: 11px; color: var(--txt3); font-family: monospace; background: white; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border2); }
.color-options { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.color-opt { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.15s; }
.color-opt.selected { border-color: var(--txt); transform: scale(1.2); }
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: var(--txt); color: white; padding: 11px 22px;
  border-radius: 24px; font-size: 13px; font-weight: 700;
  z-index: 9999; white-space: nowrap;
  animation: toastIn 0.2s ease; box-shadow: 0 6px 20px rgba(30,58,95,0.3);
}
@keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
.setup-error { background: white; border: 2px solid var(--coral-light); border-radius: var(--r); padding: 2rem; box-shadow: var(--shadow-md); }
.setup-error pre { background: var(--bg); border: 2px solid var(--border); border-radius: var(--r-sm); padding: 1rem; font-size: 11px; overflow-x: auto; line-height: 1.8; color: var(--txt); margin: 1rem 0; }
@media (max-width: 700px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .posts-grid { grid-template-columns: 1fr; }
  .row2 { grid-template-columns: 1fr; }
  .hero-title { font-size: 22px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-icon">✨</div>
      하늘청소년부
    </a>
    <div class="header-right" id="headerRight"></div>
  </div>
</header>

<div class="hero">
  <div class="hero-title">✝️ 하늘청소년부 게시판</div>
  <div class="hero-sub">공지, 건의, 질문 뭐든 자유롭게 올려요!</div>
</div>

<main class="container">
  <div id="app"><div class="loading"><div class="spinner"></div><div class="loading-text">불러오는 중...</div></div></div>
</main>
<div id="modalArea"></div>
<div id="toastArea"></div>

<script>
const SUPABASE_URL = 'https://bicovdsprnvntbxgtcny.supabase.co';
const SUPABASE_KEY = 'sb_publishable_YvNSSolhnmD0uMo9bTtamA_YaSIy4GB';
const ADMIN_PW = 'haneulteenteam2026';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const DEFAULT_CATS = [
  { key:'notice',   label:'공지',  color:'#4f9cf9' },
  { key:'suggest',  label:'건의',  color:'#34d399' },
  { key:'question', label:'질문',  color:'#a78bfa' },
  { key:'reply',    label:'답변',  color:'#fbbf24' },
];
const COLORS = ['#4f9cf9','#34d399','#a78bfa','#fbbf24','#f87171','#fb923c','#e879f9','#2dd4bf','#60a5fa','#f472b6'];

let state = {
  isAdmin: sessionStorage.getItem('isAdmin') === 'true',
  activeTab: 'all',
  search: '',
  posts: [],
  loading: true,
  showWrite: false,
  cats: JSON.parse(localStorage.getItem('board_cats') || 'null') || DEFAULT_CATS,
  newColor: COLORS[0],
};

function toast(msg, dur=2500) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.getElementById('toastArea').appendChild(el);
  setTimeout(() => el.remove(), dur);
}

function fmt(iso) {
  const d = new Date(iso), now = new Date(), diff = now - d;
  if (diff < 60000) return '방금 전';
  if (diff < 3600000) return Math.floor(diff/60000) + '분 전';
  if (diff < 86400000) return Math.floor(diff/3600000) + '시간 전';
  if (diff < 86400000*7) return Math.floor(diff/86400000) + '일 전';
  return d.toLocaleDateString('ko-KR', { month:'short', day:'numeric' });
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getCat(key) {
  return state.cats.find(c => c.key === key) || { label: key, color: '#8aaac8' };
}

function saveCats() { localStorage.setItem('board_cats', JSON.stringify(state.cats)); }

/* Supabase */
function showSetupError() {
  document.getElementById('app').innerHTML = `<div class="setup-error">
    <div style="font-size:17px;font-weight:700;color:#b91c1c;margin-bottom:8px">⚠️ 테이블 설정이 필요해요</div>
    <p style="font-size:13px;color:var(--txt2);line-height:1.7;margin-bottom:4px">Supabase SQL Editor에서 아래 SQL을 실행해 주세요.</p>
    <pre>create table posts (
  id bigint generated always as identity primary key,
  type text not null,
  title text not null,
  content text not null,
  author text not null,
  author_type text not null,
  is_secret boolean default false,
  created_at timestamptz default now()
);
alter table posts enable row level security;
create policy "public read non-secret" on posts for select using (is_secret = false);
create policy "anyone insert" on posts for insert with check (true);
create policy "anyone delete" on posts for delete using (true);</pre>
    <button class="btn btn-sky" onclick="location.reload()">새로고침</button>
  </div>`;
}

function showErrBanner(msg) {
  document.getElementById('app').innerHTML = `
    <div style="background:var(--coral-light);border:2px solid var(--coral);border-radius:var(--r);padding:1.25rem 1.5rem">
      <div style="font-size:14px;font-weight:700;color:#b91c1c;margin-bottom:6px">연결 오류</div>
      <div style="font-size:12px;color:#7f1d1d;font-family:monospace;background:white;padding:8px 10px;border-radius:8px;word-break:break-all">${esc(msg)}</div>
      <button class="btn btn-outline btn-sm" style="margin-top:10px" onclick="fetchPosts()">다시 시도</button>
    </div>`;
}

async function fetchPosts() {
  state.loading = true; render();
  try {
    const { data, error } = await db.from('posts').select('*').order('created_at', { ascending: false });
    if (error) {
      state.loading = false;
      if (error.code === '42P01' || (error.message||'').includes('does not exist')) showSetupError();
      else showErrBanner(`[${error.code}] ${error.message}`);
      return;
    }
    state.posts = state.isAdmin ? (data||[]) : (data||[]).filter(p => !p.is_secret);
  } catch(e) {
    state.loading = false; showErrBanner(e?.message || String(e)); return;
  }
  state.loading = false; render();
}

async function insertPost(post) {
  const { error } = await db.from('posts').insert([post]);
  if (error) throw error;
}

async function removePost(id) {
  const { error } = await db.from('posts').delete().eq('id', id);
  if (error) throw error;
}

function visiblePosts() {
  let list = [...state.posts];
  if (state.activeTab === 'secret') list = list.filter(p => p.is_secret);
  else if (state.activeTab !== 'all') list = list.filter(p => p.type === state.activeTab);
  if (!state.isAdmin) list = list.filter(p => !p.is_secret);
  if (state.search.trim()) {
    const q = state.search.toLowerCase();
    list = list.filter(p => p.title.toLowerCase().includes(q) || p.content.toLowerCase().includes(q) || p.author.toLowerCase().includes(q));
  }
  return list;
}

/* Render */
function render() { renderHeader(); renderApp(); }

function renderHeader() {
  const el = document.getElementById('headerRight');
  if (state.isAdmin) {
    el.innerHTML = `
      <span class="badge" style="background:#fef3c7;color:#92400e;font-size:12px">👑 관리자</span>
      <button class="btn btn-ghost btn-sm" onclick="openCatManager()">카테고리 관리</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">로그아웃</button>`;
  } else {
    el.innerHTML = `<button class="btn btn-outline btn-sm" onclick="openAdminLogin()">관리자 로그인</button>`;
  }
}

function renderApp() {
  const el = document.getElementById('app');
  if (state.loading) {
    el.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">게시물 불러오는 중...</div></div>`;
    return;
  }
  const all = state.posts;
  const pub = all.filter(p => !p.is_secret);
  const sec = all.filter(p => p.is_secret);
  const vp = visiblePosts();

  const statsHtml = `<div class="stats">
    <div class="stat"><div class="stat-icon" style="background:#e8f3ff">📋</div><div class="stat-info"><div class="stat-label">전체</div><div class="stat-value">${all.length}</div></div></div>
    <div class="stat"><div class="stat-icon" style="background:#d1fae5">✅</div><div class="stat-info"><div class="stat-label">공개</div><div class="stat-value">${pub.length}</div></div></div>
    <div class="stat"><div class="stat-icon" style="background:#fee2e2">🔒</div><div class="stat-info"><div class="stat-label">비공개</div><div class="stat-value">${sec.length}</div></div></div>
    <div class="stat"><div class="stat-icon" style="background:#ede9fe">🏷️</div><div class="stat-info"><div class="stat-label">카테고리</div><div class="stat-value">${state.cats.length}</div></div></div>
  </div>`;

  const adminBarHtml = state.isAdmin ? `
    <div class="admin-bar">
      <span class="admin-label">👑 관리자 모드 — 비공개 포함 전체 열람 및 삭제 가능</span>
      <button class="btn btn-mint btn-sm" onclick="openCatManager()">카테고리 관리</button>
    </div>` : '';

  const tabs = [
    { key:'all', label:'전체 ✨' },
    ...state.cats.map(c => ({ key:c.key, label:c.label })),
    ...(state.isAdmin ? [{ key:'secret', label:'🔒 비공개', secret:true }] : []),
  ];
  const tabHtml = tabs.map(t => {
    const cls = ['tab', t.key===state.activeTab?'active':'', t.secret?'tab-secret':''].join(' ').trim();
    return `<button class="${cls}" onclick="setTab('${esc(t.key)}')">${esc(t.label)}</button>`;
  }).join('');

  const writeHtml = state.showWrite ? `<div class="write-panel">
    <div class="write-title">✏️ 새 게시물 작성</div>
    <div class="row2">
      <div class="field"><label>카테고리</label>
        <select id="wType">${state.cats.map(c=>`<option value="${esc(c.key)}">${esc(c.label)}</option>`).join('')}</select>
      </div>
      <div class="field"><label>작성자 표시</label>
        <select id="wAuthorType" onchange="onAuthorChange()">
          <option value="익명">익명으로 게시</option>
          <option value="닉네임">닉네임으로 게시</option>
          <option value="실명">실명으로 게시</option>
        </select>
      </div>
    </div>
    <div class="field" id="authorField" style="display:none">
      <label id="authorLbl">닉네임</label>
      <input type="text" id="wAuthorName" placeholder="이름 입력" maxlength="30" />
    </div>
    <div class="field"><label>제목</label><input type="text" id="wTitle" placeholder="제목을 입력하세요" maxlength="100" /></div>
    <div class="field"><label>내용</label><textarea id="wContent" placeholder="내용을 자유롭게 작성해 주세요 😊"></textarea></div>
    <label class="secret-toggle" id="secretToggle" onclick="toggleSecret()">
      <input type="checkbox" id="wSecret" onclick="event.stopPropagation()" onchange="updateSecretStyle()" />
      🔒 비공개 게시물 (관리자만 볼 수 있어요)
    </label>
    <div class="write-footer">
      <button class="btn btn-ghost" onclick="toggleWrite()">취소</button>
      <button class="btn btn-sky btn-lg" id="submitBtn" onclick="submitPost()">🚀 게시하기</button>
    </div>
  </div>` : '';

  let postsHtml;
  if (vp.length === 0) {
    postsHtml = `<div class="empty"><div class="empty-emoji">💬</div><div class="empty-text">아직 게시물이 없어요!</div></div>`;
  } else {
    postsHtml = `<div class="posts-grid">${vp.map(p => {
      const cat = getCat(p.type);
      const secretBadge = p.is_secret ? `<span class="badge badge-secret">🔒 비공개</span>` : '';
      const delBtn = state.isAdmin ? `<button class="btn btn-coral btn-sm" onclick="confirmDelete(${p.id})">삭제</button>` : '';
      return `<div class="post-card ${p.is_secret?'secret-card':''}">
        <div class="card-top" style="background:linear-gradient(90deg,${cat.color},${cat.color}99)"></div>
        <div class="card-body">
          <div class="card-badges">
            <span class="badge" style="background:${cat.color}22;color:${cat.color}">${esc(cat.label)}</span>
            ${secretBadge}
          </div>
          <div class="card-title">${esc(p.title)}</div>
          <div class="card-content">${esc(p.content)}</div>
          <div class="card-footer">
            <div class="card-meta">${p.author_type==='익명'?'익명':esc(p.author)} · ${fmt(p.created_at)}</div>
            <div>${delBtn}</div>
          </div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  el.innerHTML = `
    ${statsHtml}${adminBarHtml}
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="검색..." value="${esc(state.search)}" oninput="setSearch(this.value)" />
      </div>
      <button class="btn btn-sky btn-lg" onclick="toggleWrite()">${state.showWrite?'✕ 닫기':'✏️ 글쓰기'}</button>
    </div>
    ${writeHtml}
    <div class="tab-wrap">${tabHtml}</div>
    ${postsHtml}`;
}

/* Actions */
function setTab(t) { if(t==='secret'&&!state.isAdmin)return; state.activeTab=t; state.search=''; render(); }
function setSearch(v) { state.search=v; renderApp(); }
function toggleWrite() { state.showWrite=!state.showWrite; render(); }
function onAuthorChange() {
  const sel=document.getElementById('wAuthorType');
  const f=document.getElementById('authorField');
  const l=document.getElementById('authorLbl');
  if(!sel||!f)return;
  if(sel.value==='익명') f.style.display='none';
  else { f.style.display='block'; l.textContent=sel.value; }
}
function toggleSecret() { const cb=document.getElementById('wSecret'); if(cb){cb.checked=!cb.checked;updateSecretStyle();} }
function updateSecretStyle() { const cb=document.getElementById('wSecret'); const el=document.getElementById('secretToggle'); if(cb&&el)el.classList.toggle('on',cb.checked); }

async function submitPost() {
  const type=document.getElementById('wType')?.value;
  const title=document.getElementById('wTitle')?.value?.trim();
  const content=document.getElementById('wContent')?.value?.trim();
  const authorType=document.getElementById('wAuthorType')?.value;
  const authorName=document.getElementById('wAuthorName')?.value?.trim();
  const isSecret=document.getElementById('wSecret')?.checked||false;
  if(!title){toast('제목을 입력해 주세요!');return;}
  if(!content){toast('내용을 입력해 주세요!');return;}
  let author='익명';
  if(authorType!=='익명'){if(!authorName){toast('이름을 입력해 주세요!');return;}author=authorName;}
  const btn=document.getElementById('submitBtn');
  if(btn){btn.disabled=true;btn.textContent='게시 중...';}
  try {
    await insertPost({type,title,content,author,author_type:authorType,is_secret:isSecret});
    toast('게시물이 올라갔어요! 🎉');
    state.showWrite=false; await fetchPosts();
  } catch(e) {
    toast('게시에 실패했어요.');
    if(btn){btn.disabled=false;btn.textContent='🚀 게시하기';}
  }
}

function confirmDelete(id) {
  openModal(`<div class="modal-title">🗑️ 게시물 삭제</div>
    <p style="font-size:14px;color:var(--txt2);line-height:1.7">이 게시물을 삭제할까요?<br>삭제 후에는 되돌릴 수 없어요.</p>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-coral" onclick="doDelete(${id})">삭제하기</button>
    </div>`);
}

async function doDelete(id) {
  closeModal();
  try { await removePost(id); toast('삭제됐어요!'); await fetchPosts(); }
  catch(e) { toast('삭제에 실패했어요.'); }
}

/* Category manager */
function openCatManager() {
  const items = state.cats.map((c,i) => `
    <div class="cat-item">
      <div class="cat-dot" style="background:${c.color}"></div>
      <span class="cat-name">${esc(c.label)}</span>
      <span class="cat-key">${esc(c.key)}</span>
      <button class="btn btn-coral btn-sm" onclick="removeCat(${i})">삭제</button>
    </div>`).join('');

  const colorOpts = COLORS.map(col =>
    `<div class="color-opt ${state.newColor===col?'selected':''}" style="background:${col}" onclick="pickColor('${col}')"></div>`
  ).join('');

  openModal(`
    <div class="modal-title">🏷️ 카테고리 관리</div>
    <div class="cat-list">${items||'<div style="text-align:center;color:var(--txt3);font-size:13px;padding:1rem">카테고리가 없어요</div>'}</div>
    <div style="border-top:2px solid var(--border);padding-top:1rem">
      <div style="font-size:13px;font-weight:700;color:var(--txt);margin-bottom:10px">새 카테고리 추가</div>
      <div class="row2" style="margin-bottom:10px">
        <div class="field" style="margin:0"><label>이름</label><input type="text" id="nLabel" placeholder="예: 기도제목" maxlength="10"/></div>
        <div class="field" style="margin:0"><label>키 (영문)</label><input type="text" id="nKey" placeholder="예: prayer" maxlength="20"/></div>
      </div>
      <div style="font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:6px">색상 선택</div>
      <div class="color-options">${colorOpts}</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">닫기</button>
      <button class="btn btn-mint" onclick="addCat()">➕ 추가</button>
    </div>`, true);
}

function pickColor(col) { state.newColor=col; openCatManager(); }

function removeCat(i) {
  if(state.cats.length<=1){toast('카테고리는 최소 1개 필요해요!');return;}
  state.cats.splice(i,1); saveCats(); toast('삭제했어요.');
  openCatManager(); renderApp();
}

function addCat() {
  const label=document.getElementById('nLabel')?.value?.trim();
  const key=document.getElementById('nKey')?.value?.trim().toLowerCase().replace(/\s+/g,'_');
  if(!label){toast('이름을 입력해 주세요!');return;}
  if(!key){toast('키를 입력해 주세요! (영문)');return;}
  if(state.cats.find(c=>c.key===key)){toast('이미 있는 키예요!');return;}
  state.cats.push({key,label,color:state.newColor});
  saveCats(); toast(`"${label}" 카테고리 추가됐어요! 🎉`);
  openCatManager(); renderApp();
}

/* Admin */
function openAdminLogin() {
  openModal(`<div class="modal-title">👑 관리자 로그인</div>
    <div class="field"><label>비밀번호</label>
      <input type="password" id="adminPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')tryLogin()" />
    </div>
    <div class="error-msg" id="loginErr">❌ 비밀번호가 틀렸어요!</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-sky" onclick="tryLogin()">로그인</button>
    </div>
    <div class="hint-box">관리자 전용 비밀번호를 입력하세요.</div>`);
  setTimeout(()=>document.getElementById('adminPw')?.focus(),50);
}

async function tryLogin() {
  const pw=document.getElementById('adminPw')?.value;
  if(pw===ADMIN_PW){
    state.isAdmin=true; sessionStorage.setItem('isAdmin','true');
    closeModal(); toast('관리자로 로그인했어요! 👑');
    await fetchPosts();
  } else {
    const err=document.getElementById('loginErr');
    if(err)err.style.display='block';
  }
}

function logout() {
  state.isAdmin=false; sessionStorage.removeItem('isAdmin');
  if(state.activeTab==='secret')state.activeTab='all';
  toast('로그아웃됐어요!'); fetchPosts();
}

/* Modal */
function openModal(html,large=false) {
  document.getElementById('modalArea').innerHTML=
    `<div class="modal-backdrop" onclick="handleBd(event)"><div class="modal ${large?'modal-lg':''}">${html}</div></div>`;
}
function closeModal(){document.getElementById('modalArea').innerHTML='';}
function handleBd(e){if(e.target===e.currentTarget)closeModal();}

fetchPosts();
</script>
</body>
</html>
