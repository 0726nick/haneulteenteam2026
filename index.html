<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mu엇이든 Mul어 Board</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#7ab3cc;--sky-light:#e8f2f7;--sky-mid:#a8cedd;--sky-dark:#4d8aa8;
  --peach:#e07d5a;--peach-light:#fdf0eb;--peach-mid:#eba98e;--peach-dark:#c4613c;
  --cream:#fdf8f3;--warm:#f5ede4;--warm2:#ede0d4;
  --border:#e8ddd4;--border2:#d9ccc0;
  --txt:#3d2e24;--txt2:#7a6458;--txt3:#b09e94;
  --r:18px;--r-sm:12px;
  --shadow:0 2px 10px rgba(61,46,36,.07);
  --shadow-md:0 6px 24px rgba(61,46,36,.10);
  --shadow-lg:0 14px 44px rgba(61,46,36,.13);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--txt);font-size:14px;line-height:1.65;min-height:100vh}

/* Header */
.header{background:rgba(253,248,243,.94);backdrop-filter:blur(12px);border-bottom:1.5px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 14px rgba(61,46,36,.06)}
.header-inner{max-width:1080px;margin:0 auto;padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--sky),var(--sky-dark));display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 3px 8px rgba(74,138,168,.28)}
.logo-text{font-family:'Gowun Dodum',serif;font-size:15px;color:var(--txt);line-height:1.2}
.logo-text span{color:var(--peach)}
.header-right{display:flex;align-items:center;gap:8px}

/* Hero */
.hero{background:linear-gradient(160deg,#c8dfe8 0%,#daeaf2 30%,#f5e8df 70%,#f0d9cc 100%);padding:3rem 1.5rem 2.75rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 80%,rgba(224,125,90,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 85% 20%,rgba(122,179,204,.18) 0%,transparent 60%)}
.hero-inner{position:relative;max-width:640px;margin:0 auto}
.hero-eyebrow{font-family:'Gowun Dodum',serif;font-size:12px;letter-spacing:.14em;color:var(--sky-dark);text-transform:uppercase;margin-bottom:18px;opacity:.8}
.hero-main{font-family:'Gowun Dodum',serif;font-size:40px;letter-spacing:-.5px;line-height:1.2;margin-bottom:10px}
.hero-main .en{color:var(--peach)}
.hero-main .ko{color:var(--sky-dark)}
.hero-sub{font-family:'Gowun Dodum',serif;font-size:13px;color:var(--txt3);letter-spacing:.04em}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-sm);font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;border:none;transition:all .18s;white-space:nowrap}
.btn-sky{background:var(--sky);color:white;box-shadow:0 3px 10px rgba(122,179,204,.4)}
.btn-sky:hover{background:var(--sky-dark);transform:translateY(-1px)}
.btn-peach{background:var(--peach);color:white;box-shadow:0 3px 10px rgba(224,125,90,.35)}
.btn-peach:hover{background:var(--peach-dark);transform:translateY(-1px)}
.btn-outline{background:white;color:var(--txt2);border:1.5px solid var(--border2)}
.btn-outline:hover{background:var(--warm);border-color:var(--peach-mid);color:var(--peach-dark)}
.btn-ghost{background:transparent;color:var(--txt3);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--warm);color:var(--txt2);border-color:var(--border2)}
.btn-danger{background:#fdecea;color:#b91c1c;border:1.5px solid #fca5a5}
.btn-danger:hover{background:#fee2e2}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-lg{padding:11px 24px;font-size:14px;border-radius:var(--r)}
.btn[disabled]{opacity:.55;cursor:not-allowed;transform:none!important}

/* Container */
.container{max-width:1080px;margin:0 auto;padding:1.75rem 1.5rem}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.stat{background:white;border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);border:1.5px solid var(--border);display:flex;align-items:center;gap:12px;transition:transform .18s,box-shadow .18s}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.stat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.stat-label{font-size:11px;color:var(--txt3);font-weight:600;letter-spacing:.04em;margin-bottom:2px}
.stat-value{font-family:'Gowun Dodum',serif;font-size:24px;color:var(--txt);line-height:1}

/* Admin bar */
.admin-bar{background:linear-gradient(135deg,#fef9ec,#fef3d8);border:1.5px solid #f5d67a;border-radius:var(--r);padding:10px 16px;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between}
.admin-label{font-size:13px;color:#92400e;font-weight:600}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--border2);border-radius:var(--r-sm);background:white;font-family:inherit;font-size:13px;color:var(--txt);outline:none;transition:all .18s;font-weight:500}
.search-wrap input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(122,179,204,.18)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px}

/* Tabs */
.tab-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.tab{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:white;color:var(--txt2);transition:all .18s;font-family:inherit}
.tab:hover{border-color:var(--sky-mid);color:var(--sky-dark);background:var(--sky-light)}
.tab.active{background:var(--sky);color:white;border-color:var(--sky);box-shadow:0 3px 10px rgba(122,179,204,.35)}
.tab-secret{border-color:#f5d67a!important;color:#92400e!important}
.tab-secret.active{background:#f5d67a!important;color:#92400e!important;border-color:#f5d67a!important;box-shadow:0 3px 8px rgba(245,214,122,.4)!important}

/* Write panel */
.write-panel{background:white;border:1.5px solid var(--border2);border-radius:var(--r);padding:1.5rem;margin-bottom:1.5rem;box-shadow:var(--shadow-md);animation:slideDown .22s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.write-title{font-family:'Gowun Dodum',serif;font-size:17px;margin-bottom:1.25rem;color:var(--txt)}
.field{margin-bottom:13px}
.field label{font-size:12px;color:var(--txt2);font-weight:600;display:block;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border2);border-radius:var(--r-sm);background:var(--warm);font-family:inherit;font-size:13px;color:var(--txt);outline:none;transition:all .18s;font-weight:500}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--sky);background:white;box-shadow:0 0 0 3px rgba(122,179,204,.14)}
.field textarea{resize:vertical;min-height:100px;line-height:1.7}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.secret-toggle{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:var(--r-sm);border:1.5px solid var(--border2);cursor:pointer;font-size:13px;color:var(--txt2);font-weight:600;transition:all .18s;user-select:none;background:var(--warm)}
.secret-toggle:hover,.secret-toggle.on{border-color:var(--peach-mid);color:var(--peach-dark);background:var(--peach-light)}
.secret-toggle input{width:14px;height:14px;accent-color:var(--peach)}
.write-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1.5px solid var(--border)}

/* Grid */
.posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.post-card{background:white;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);transition:all .22s;display:flex;flex-direction:column}
.post-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--border2)}
.post-card.secret-card{border-color:var(--peach-mid)}
.card-stripe{height:5px}
.card-body{padding:16px;flex:1;display:flex;flex-direction:column}
.card-badges{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:9px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-secret{background:var(--peach-light);color:var(--peach-dark);border:1px solid var(--peach-mid)}
.card-title{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:8px;line-height:1.45}
.card-content{font-size:13px;color:var(--txt2);line-height:1.65;flex:1;margin-bottom:12px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1.5px solid var(--border);gap:8px}
.card-meta{font-size:11px;color:var(--txt3);font-weight:500;flex-shrink:0}
.card-actions{display:flex;align-items:center;gap:5px}
/* More menu */
.more-wrap{position:relative;display:inline-flex}
.more-btn{width:28px;height:28px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt3);font-size:16px;transition:all .15s;line-height:1}
.more-btn:hover{background:var(--warm2);color:var(--txt2)}
.more-menu{position:absolute;bottom:calc(100% + 6px);right:0;background:white;border:1.5px solid var(--border2);border-radius:var(--r-sm);box-shadow:var(--shadow-md);min-width:110px;z-index:50;overflow:hidden;animation:popIn .15s ease}
.more-menu-item{display:flex;align-items:center;gap:7px;padding:9px 13px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;color:var(--txt2);transition:background .12s}
.more-menu-item:hover{background:var(--warm)}
.more-menu-item.danger{color:#b91c1c}
.more-menu-item.danger:hover{background:#fdecea}

/* Like & Comment buttons on card */
.like-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:white;color:var(--txt3);transition:all .18s;font-family:inherit}
.like-btn:hover{border-color:var(--peach-mid);color:var(--peach);background:var(--peach-light)}
.like-btn.liked{border-color:var(--peach-mid);color:var(--peach-dark);background:var(--peach-light)}
.comment-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:white;color:var(--txt3);transition:all .18s;font-family:inherit}
.comment-btn:hover{border-color:var(--sky-mid);color:var(--sky-dark);background:var(--sky-light)}

/* Post detail modal */
.detail-title{font-family:'Gowun Dodum',serif;font-size:18px;color:var(--txt);margin-bottom:6px;line-height:1.4}
.detail-meta{font-size:12px;color:var(--txt3);margin-bottom:14px;font-weight:500}
.detail-content{font-size:14px;color:var(--txt2);line-height:1.75;margin-bottom:18px;white-space:pre-wrap;word-break:break-word}
.detail-like-row{display:flex;align-items:center;gap:8px;padding:12px 0;border-top:1.5px solid var(--border);border-bottom:1.5px solid var(--border);margin-bottom:18px}
.comments-section{margin-top:4px}
.comments-title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.comment-item{background:var(--warm);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:8px;position:relative}
.comment-author{font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:3px}
.comment-body{font-size:13px;color:var(--txt);line-height:1.6;white-space:pre-wrap;word-break:break-word}
.comment-time{font-size:11px;color:var(--txt3);margin-top:4px}
.comment-del{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;font-size:13px;color:var(--txt3);padding:2px 5px;border-radius:4px;display:none}
.comment-del:hover{color:#b91c1c;background:#fdecea}
.comment-form{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.comment-form input,.comment-form textarea{border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:9px 12px;font-family:inherit;font-size:13px;color:var(--txt);background:white;outline:none;transition:border-color .18s}
.comment-form input:focus,.comment-form textarea:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(122,179,204,.14)}
.comment-form textarea{resize:vertical;min-height:70px;line-height:1.6}
.comment-form-row{display:flex;gap:8px}
.no-comments{text-align:center;padding:1.5rem;color:var(--txt3);font-size:13px;font-family:'Gowun Dodum',serif}

/* Empty / Loading */
.empty{text-align:center;padding:5rem 1rem}
.empty-emoji{font-size:48px;margin-bottom:12px}
.empty-text{font-size:14px;color:var(--txt3);font-weight:600;font-family:'Gowun Dodum',serif}
.loading{text-align:center;padding:4rem}
.spinner{width:34px;height:34px;border:3px solid var(--border2);border-top-color:var(--sky);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--txt3);font-weight:600;font-family:'Gowun Dodum',serif}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(61,46,36,.38);display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem;animation:fadeIn .16s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:white;border-radius:var(--r);padding:1.75rem;width:100%;max-width:460px;box-shadow:var(--shadow-lg);border:1.5px solid var(--border2);animation:popIn .2s ease;max-height:90vh;overflow-y:auto}
.modal-lg{max-width:560px}
.modal-xl{max-width:640px}
@keyframes popIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-title{font-family:'Gowun Dodum',serif;font-size:19px;margin-bottom:1.25rem;color:var(--txt)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.error-msg{font-size:12px;color:var(--peach-dark);margin-top:5px;display:none;font-weight:600}
.hint-box{margin-top:12px;padding:10px 13px;background:var(--sky-light);border-radius:var(--r-sm);font-size:12px;color:var(--sky-dark);font-weight:600;border:1px solid var(--sky-mid)}

/* Category manager — state preserved */
.cat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;max-height:220px;overflow-y:auto}
.cat-item{display:flex;align-items:center;gap:10px;background:var(--warm);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:9px 12px}
.cat-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.cat-name{flex:1;font-size:13px;font-weight:600;color:var(--txt)}
.cat-key{font-size:11px;color:var(--txt3);font-family:monospace;background:white;padding:2px 6px;border-radius:4px;border:1px solid var(--border2)}
.color-options{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.color-opt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.color-opt.selected{border-color:var(--txt);transform:scale(1.2)}
.icon-picker{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.icon-opt{width:32px;height:32px;border-radius:8px;cursor:pointer;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s;background:var(--warm)}
.icon-opt:hover{background:var(--warm2)}
.icon-opt.selected{border-color:var(--sky);background:var(--sky-light)}
.add-sep{border:none;border-top:1.5px solid var(--border);margin:.875rem 0}
.section-label{font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:5px}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--txt);color:#fdf8f3;padding:11px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;white-space:nowrap;animation:toastIn .2s ease;box-shadow:0 6px 20px rgba(61,46,36,.25)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.setup-error{background:white;border:1.5px solid #fca5a5;border-radius:var(--r);padding:2rem;box-shadow:var(--shadow)}
.setup-error pre{background:var(--warm);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:1rem;font-size:11px;overflow-x:auto;line-height:1.8;color:var(--txt);margin:1rem 0}

@media(max-width:680px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .posts-grid{grid-template-columns:1fr}
  .row2{grid-template-columns:1fr}
  .hero-main{font-size:30px}
  .hero-main .board{font-size:22px}
  .container{padding:1.25rem 1rem}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-mark">🕊️</div>
      <div class="logo-text">높은뜻 하늘교회 <span>청소년부</span></div>
    </a>
    <div class="header-right" id="headerRight"></div>
  </div>
</header>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">높은뜻 하늘교회 청소년부</div>
    <div class="hero-main">
      <span class="en">Mu</span><span class="ko">엇이든</span>&nbsp;<span class="en">Mul</span><span class="ko">어</span>&nbsp;<span class="en">Board</span>
    </div>
    <div class="hero-sub">공지, 건의, 질문 — 뭐든 편하게 올려요 ✉️</div>
  </div>
</div>

<main class="container">
  <div id="app"><div class="loading"><div class="spinner"></div><div class="loading-text">불러오는 중...</div></div></div>
</main>
<div id="modalArea"></div>
<div id="toastArea"></div>

<script>
const SUPABASE_URL = 'https://bicovdsprnvntbxgtcny.supabase.co';
const SUPABASE_KEY = 'sb_publishable_YvNSSolhnmD0uMo9bTtamA_YaSIy4GB';
const ADMIN_PW = 'haneulteenteam2026';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const DEFAULT_CATS = [
  { key:'notice',   label:'공지', icon:'📢', color:'#7ab3cc' },
  { key:'suggest',  label:'건의', icon:'💌', color:'#e07d5a' },
  { key:'question', label:'질문', icon:'🙋', color:'#a8cedd' },
  { key:'reply',    label:'답변', icon:'💬', color:'#eba98e' },
];
const COLORS = ['#7ab3cc','#e07d5a','#a8cedd','#eba98e','#b5a4c8','#84bfa8','#e8b86d','#c98ca0','#8fb9a8','#d4956a'];
const ICONS  = ['📢','💌','🙋','💬','🙏','📖','🎵','⚽','🎉','📝','❓','💡','📌','🕊️','🌱','🔔','👋','✝️','🌟','💛'];

/* ── State ── */
let state = {
  isAdmin: sessionStorage.getItem('isAdmin') === 'true',
  activeTab: 'all',
  search: '',
  posts: [],
  likes: {},       // postId → count
  commentCounts: {}, // postId → count (light, from index fetch)
  myLikes: (()=>{ try { const v=JSON.parse(localStorage.getItem('myLikes')||'[]'); return new Set(Array.isArray(v)?v:[]); } catch(e){ return new Set(); } })(),
  comments: {},    // postId → [{id,author,body,created_at}]
  loading: true,
  showWrite: false,
  cats: JSON.parse(localStorage.getItem('board_cats')||'null') || DEFAULT_CATS,
  categorySync: true,
  /* category modal draft — persists during color/icon picks */
  draft: { label:'', key:'', color: COLORS[0], icon: ICONS[0] },
  myPosts: new Set((()=>{ try { const v = JSON.parse(localStorage.getItem('myPosts')||'[]'); return Array.isArray(v) ? v : []; } catch(e){ return []; } })()),
  myComments: new Set((()=>{ try { const v = JSON.parse(localStorage.getItem('myComments')||'[]'); return Array.isArray(v) ? v : []; } catch(e){ return []; } })()),
};

/* ── Utils ── */
function toast(msg, dur=2600) {
  const el = document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.getElementById('toastArea').appendChild(el);
  setTimeout(()=>el.remove(), dur);
}
function fmt(iso) {
  const d=new Date(iso),now=new Date(),diff=now-d;
  if(diff<60000) return '방금 전';
  if(diff<3600000) return Math.floor(diff/60000)+'분 전';
  if(diff<86400000) return Math.floor(diff/3600000)+'시간 전';
  if(diff<86400000*7) return Math.floor(diff/86400000)+'일 전';
  return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function getCat(key){ return state.cats.find(c=>c.key===key)||{label:key,icon:'📌',color:'#b09e94'} }
function saveCats(){ localStorage.setItem('board_cats',JSON.stringify(state.cats)) }
function saveMyLikes(){ localStorage.setItem('myLikes',JSON.stringify([...state.myLikes])) }
function saveMyPosts(){ localStorage.setItem('myPosts',JSON.stringify([...state.myPosts])) }
function saveMyComments(){ localStorage.setItem('myComments',JSON.stringify([...state.myComments])) }
function hexAlpha(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})` }

function normalizeCats(rows){
  return (rows||[]).map(r=>({
    key:r.key,
    label:r.label,
    icon:r.icon||'📌',
    color:r.color||'#b09e94'
  }));
}

async function fetchCategories(){
  const { data, error } = await db.from('categories').select('*').order('sort_order',{ascending:true});
  if(error) return { data:null, error };
  return { data: normalizeCats(data), error:null };
}

async function seedDefaultCategories(){
  const payload = DEFAULT_CATS.map((c,idx)=>({
    key:c.key, label:c.label, icon:c.icon, color:c.color, sort_order:idx
  }));
  const { error } = await db.from('categories').upsert(payload, { onConflict:'key' });
  return { error };
}

async function createCategoryRemote(cat){
  return await db.from('categories').insert([{
    key:cat.key, label:cat.label, icon:cat.icon, color:cat.color, sort_order:state.cats.length
  }]);
}

async function removeCategoryRemote(key){
  return await db.from('categories').delete().eq('key', key);
}

function showErrBanner(msg){
  document.getElementById('app').innerHTML=`
    <div style="background:#fdecea;border:1.5px solid #fca5a5;border-radius:var(--r);padding:1.25rem 1.5rem">

    </div>`;

async function fetchAll(){
  state.loading=true; render();
  try {
    const [postsRes, cmtRes, catRes] = await Promise.all([
      db.from('posts').select('*').order('created_at',{ascending:false}),
      db.from('comments').select('id, post_id'),
      fetchCategories()
    ]);
    if(postsRes.error){
      state.loading=false;
      if(postsRes.error.code==='42P01'||(postsRes.error.message||'').includes('does not exist')) showSetupError();
      else showErrBanner(`[${postsRes.error.code}] ${postsRes.error.message}`);
      return;
    }
    const data = postsRes.data||[];
    /* RLS returns all rows (policy updated to allow select always).
       Non-admin: filter out secret posts client-side */
    state.posts = state.isAdmin ? data : data.filter(p=>!p.is_secret);
    state.likes={};
    data.forEach(p=>{ state.likes[p.id]=p.likes||0; });
    state.commentCounts={};
    (cmtRes.data||[]).forEach(c=>{
      state.commentCounts[c.post_id]=(state.commentCounts[c.post_id]||0)+1;
    });

    if(catRes.error){
      state.categorySync = false;
      state.cats = JSON.parse(localStorage.getItem('board_cats')||'null') || DEFAULT_CATS;
    } else if((catRes.data||[]).length===0){
      const seeded = await seedDefaultCategories();
      if(!seeded.error){
        const retry = await fetchCategories();
        state.cats = (!retry.error && (retry.data||[]).length) ? retry.data : DEFAULT_CATS;
      } else {
        state.categorySync = false;
        state.cats = JSON.parse(localStorage.getItem('board_cats')||'null') || DEFAULT_CATS;
      }
    } else {
      state.categorySync = true;
      state.cats = catRes.data;
    }
    saveCats();
    state.comments={};
  } catch(e){ state.loading=false; showErrBanner(e?.message||String(e)); return; }
  state.loading=false; render();
}

async function fetchCommentsForPost(postId){
  if(state.comments[postId]) return;
  const {data}=await db.from('comments').select('*').eq('post_id',postId).order('created_at',{ascending:true});
  state.comments[postId]=data||[];
}

async function insertPost(post){ const {data,error}=await db.from('posts').insert([post]).select().single(); if(error) throw error; return data; }
async function deletePost(id){ const {error}=await db.from('posts').delete().eq('id',id); if(error) throw error; }

async function updatePostByCode(id, title, content, editCode){
  let q = db.from('posts').update({ title, content }).eq('id', id);
  if(!state.isAdmin) q = q.eq('edit_code', editCode);
  const { data, error } = await q.select();
  if(error) throw error;
  if(!data || data.length===0) throw new Error('비밀번호가 올바르지 않아요.');
  return data[0];
}

async function deletePostByCode(id, editCode){
  let q = db.from('posts').delete().eq('id', id);
  if(!state.isAdmin) q = q.eq('edit_code', editCode);
  const { data, error } = await q.select();
  if(error) throw error;
  if(!data || data.length===0) throw new Error('비밀번호가 올바르지 않아요.');
  return true;
}
async function incrementLike(id){
  const cur = state.likes[id]||0;
  const {error}=await db.from('posts').update({likes:cur+1}).eq('id',id);
  if(error) throw error;
  state.likes[id]=cur+1;
}
async function insertComment(postId,author,body){
  const {data,error}=await db.from('comments').insert([{post_id:postId,author,body}]).select().single();
  if(error) throw error;
  if(!state.comments[postId]) state.comments[postId]=[];
  state.comments[postId].push(data);
  return data;
}
async function deleteComment(postId,commentId){
  const {error}=await db.from('comments').delete().eq('id',commentId);
  if(error) throw error;
  state.comments[postId]=(state.comments[postId]||[]).filter(c=>c.id!==commentId);
}

/* ── Computed ── */
function visiblePosts(){
  let list=[...state.posts];
  if(state.activeTab==='secret') list=list.filter(p=>p.is_secret);
  else if(state.activeTab!=='all') list=list.filter(p=>p.type===state.activeTab);
  if(!state.isAdmin) list=list.filter(p=>!p.is_secret);
  if(state.search.trim()){
    const q=state.search.toLowerCase();
    list=list.filter(p=>p.title.toLowerCase().includes(q)||p.content.toLowerCase().includes(q)||p.author.toLowerCase().includes(q));
  }
  return list;
}

/* ── Post Detail Modal (likes + comments) ── */
async function openDetail(postId){
  const post=state.posts.find(p=>p.id===postId);
  if(!post) return;
  const cat=getCat(post.type);
  await fetchCommentsForPost(postId);
  renderDetailModal(post, cat);
}

function renderDetailModal(post, cat){
  const liked=state.myLikes.has(post.id);
  const likeCount=state.likes[post.id]||0;
  const cmts=state.comments[post.id]||[];
  const cmtHtml=cmts.length===0
    ?`<div class="no-comments">아직 댓글이 없어요. 첫 댓글을 남겨봐요 🙂</div>`
    :cmts.map(c=>`<div class="comment-item" id="cmt-${c.id}">
        <div class="comment-author">${esc(c.author)}</div>
        <div class="comment-body">${esc(c.body)}</div>
        <div class="comment-time">${fmt(c.created_at)}</div>
        ${(state.isAdmin || state.myComments.has(c.id))?`<button class="comment-del" style="display:block" onclick="doDeleteComment(${post.id},${c.id})">✕</button>`:''}
      </div>`).join('');

  openModal(`
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
      <span class="badge" style="background:${hexAlpha(cat.color,.14)};color:${cat.color}">${cat.icon||''} ${esc(cat.label)}</span>
      ${post.is_secret?'<span class="badge badge-secret">🔒 비공개</span>':''}
    </div>
    <div class="detail-title">${esc(post.title)}</div>
    <div class="detail-meta">${post.author_type==='익명'?'익명':esc(post.author)} · ${fmt(post.created_at)}</div>
    <div class="detail-content">${esc(post.content)}</div>
    <div class="detail-like-row">
      <button class="like-btn ${liked?'liked':''}" id="detail-like-btn" onclick="toggleLike(event,${post.id},true)">❤️ 좋아요 ${likeCount}</button>
      <span style="font-size:12px;color:var(--txt3)">${liked?'이미 좋아요를 눌렀어요':'좋아요를 눌러보세요!'}</span>
    </div>
    <div class="comments-section">
      <div class="comments-title">💬 댓글 <span style="color:var(--txt3);font-weight:400">${cmts.length}개</span></div>
      <div id="cmtList">${cmtHtml}</div>
      <div class="comment-form">
        <div class="comment-form-row">
          <input type="text" id="cmtAuthor" placeholder="이름 (익명 가능)" style="flex:1" maxlength="20" />
        </div>
        <textarea id="cmtBody" placeholder="댓글을 남겨봐요 ✏️" rows="3"></textarea>
        <div style="display:flex;justify-content:flex-end">
          <button class="btn btn-sky btn-sm" onclick="submitComment(${post.id})">댓글 달기</button>
        </div>
      </div>
    </div>
    <div class="modal-footer" style="padding-top:0;margin-top:.75rem">
      ${(state.isAdmin || state.myPosts.has(post.id))?`<button class="btn btn-outline btn-sm" onclick="openEditPost(${post.id},true)">게시물 수정</button><button class="btn btn-danger btn-sm" onclick="confirmDelete(${post.id},true)">게시물 삭제</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">닫기</button>
    </div>`, false, true);
}

async function toggleLike(e, postId, fromDetail=false){
  e.stopPropagation();
  if(state.myLikes.has(postId)){ toast('이미 좋아요를 눌렀어요 ❤️'); return; }
  try {
    await incrementLike(postId);
    state.myLikes.add(postId); saveMyLikes();
    renderApp();
    if(fromDetail){
      const post=state.posts.find(p=>p.id===postId);
      const cat=getCat(post.type);
      renderDetailModal(post,cat);
    }
  } catch(err){ toast('좋아요 처리에 실패했어요.'); }
}

async function submitComment(postId){
  const author=(document.getElementById('cmtAuthor')?.value?.trim())||'익명';
  const body=document.getElementById('cmtBody')?.value?.trim();
  if(!body){ toast('댓글 내용을 입력해 주세요!'); return; }
  const btn=document.querySelector('.comment-form .btn-sky');
  if(btn){btn.disabled=true;btn.textContent='등록 중...';}
  try {
    const created = await insertComment(postId,author,body);
    if(created?.id){ state.myComments.add(created.id); saveMyComments(); }
    state.commentCounts[postId]=(state.commentCounts[postId]||0)+1;
    toast('댓글이 달렸어요! 💬');
    const post=state.posts.find(p=>p.id===postId);
    const cat=getCat(post.type);
    renderApp();
    renderDetailModal(post,cat);
  } catch(err){
    toast('댓글 등록에 실패했어요.');
    if(btn){btn.disabled=false;btn.textContent='댓글 달기';}
  }
}

async function doDeleteComment(postId,cmtId){
  try {
    await deleteComment(postId,cmtId);
    state.myComments.delete(cmtId); saveMyComments();
    state.commentCounts[postId]=Math.max(0,(state.commentCounts[postId]||1)-1);
    toast('댓글을 삭제했어요.');
    const post=state.posts.find(p=>p.id===postId);
    const cat=getCat(post.type);
    renderApp();
    renderDetailModal(post,cat);
  } catch(e){ toast('삭제에 실패했어요.'); }
}

function toggleWrite(){ state.showWrite=!state.showWrite; render(); }
function onAuthorChange(){
  const sel=document.getElementById('wAuthorType'),f=document.getElementById('authorField'),l=document.getElementById('authorLbl');
  if(!sel||!f)return;
  if(sel.value==='익명') f.style.display='none';
  else{f.style.display='block';l.textContent=sel.value;}
}
function toggleSecret(){ const cb=document.getElementById('wSecret'); if(cb){cb.checked=!cb.checked;updateSecretStyle();} }
function updateSecretStyle(){ const cb=document.getElementById('wSecret'),el=document.getElementById('secretToggle'); if(cb&&el)el.classList.toggle('on',cb.checked); }

async function submitPost(){
  const type=document.getElementById('wType')?.value;
  const title=document.getElementById('wTitle')?.value?.trim();
  const content=document.getElementById('wContent')?.value?.trim();
  const authorType=document.getElementById('wAuthorType')?.value;
  const authorName=document.getElementById('wAuthorName')?.value?.trim();
  const isSecret=document.getElementById('wSecret')?.checked||false;
  const editCode=document.getElementById('wEditCode')?.value?.trim();
  if(!title){toast('제목을 입력해 주세요!');return;}
  if(!content){toast('내용을 입력해 주세요!');return;}
  if(!editCode || editCode.length < 4){toast('글 비밀번호를 4자 이상 입력해 주세요!');return;}
  let author='익명';
  if(authorType!=='익명'){if(!authorName){toast('이름을 입력해 주세요!');return;}author=authorName;}
  const btn=document.getElementById('submitBtn');
  if(btn){btn.disabled=true;btn.textContent='올리는 중...';}
  try {
    const created = await insertPost({type,title,content,author,author_type:authorType,is_secret:isSecret,likes:0,edit_code:editCode});
    if(created?.id){ state.myPosts.add(created.id); saveMyPosts(); }
    toast('게시물이 올라갔어요! 🎉');
    state.showWrite=false; await fetchAll();
  } catch(e){
    toast('게시에 실패했어요.');
    if(btn){btn.disabled=false;btn.textContent='게시하기 →';}
  }
}

function confirmDelete(id, fromDetail=false){
  const post = state.posts.find(p=>p.id===id);
  if(!post) return;
  if(state.isAdmin){
    openModal(`<div class="modal-title">게시물을 삭제할까요?</div>
      <p style="font-size:13px;color:var(--txt2);line-height:1.7">삭제 후에는 되돌릴 수 없어요.</p>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="${fromDetail?'openDetail('+id+')':'closeModal()'}">취소</button>
        <button class="btn btn-danger" onclick="doDelete(${id}, '')">삭제하기</button>
      </div>`);
    return;
  }
  openModal(`<div class="modal-title">게시물 삭제</div>
    <div class="field"><label>글 비밀번호</label><input type="password" id="postDeleteCode" placeholder="작성 시 입력한 비밀번호" onkeydown="if(event.key==='Enter')doDelete(${id}, document.getElementById('postDeleteCode').value)" /></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="${fromDetail?'openDetail('+id+')':'closeModal()'}">취소</button>
      <button class="btn btn-danger" onclick="doDelete(${id}, document.getElementById('postDeleteCode').value)">삭제하기</button>
    </div>`);
}

async function doDelete(id, code){
  closeModal();
  try{
    if(state.isAdmin) await deletePost(id);
    else await deletePostByCode(id, code||'');
    state.myPosts.delete(id); saveMyPosts();
    toast('삭제됐어요.');
    await fetchAll();
  } catch(e){
    toast(e?.message || '삭제에 실패했어요.');
  }
}

function openEditPost(id, fromDetail=false){
  const post = state.posts.find(p=>p.id===id);
  if(!post) return;
  const footerCancel = fromDetail ? `openDetail(${id})` : 'closeModal()';
  openModal(`<div class="modal-title">게시물 수정</div>
    <div class="field"><label>제목</label><input type="text" id="editTitle" value="${esc(post.title)}" maxlength="100" /></div>
    <div class="field"><label>내용</label><textarea id="editContent" rows="6">${esc(post.content)}</textarea></div>
    ${state.isAdmin ? '' : `<div class="field"><label>글 비밀번호</label><input type="password" id="editCode" placeholder="작성 시 입력한 비밀번호" /></div>`}
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="${footerCancel}">취소</button>
      <button class="btn btn-sky" onclick="saveEditPost(${id}, ${fromDetail ? 'true' : 'false'})">저장</button>
    </div>`, true);
}

async function saveEditPost(id, fromDetail=false){
  const title = document.getElementById('editTitle')?.value?.trim();
  const content = document.getElementById('editContent')?.value?.trim();
  const code = document.getElementById('editCode')?.value?.trim() || '';
  if(!title){ toast('제목을 입력해 주세요!'); return; }
  if(!content){ toast('내용을 입력해 주세요!'); return; }
  try{
    await updatePostByCode(id, title, content, code);
    toast('수정됐어요.');
    closeModal();
    await fetchAll();
    if(fromDetail){
      const post = state.posts.find(p=>p.id===id);
      if(post) openDetail(id);
    }
  } catch(e){
    toast(e?.message || '수정에 실패했어요.');
  }
}

/* ── Category Manager — draft state prevents reset ── */
function openCatManager(){
  /* read inputs if modal is already open (preserves text while picking color/icon) */
  const lEl=document.getElementById('nLabel'), kEl=document.getElementById('nKey');
  if(lEl) state.draft.label=lEl.value;
  if(kEl) state.draft.key=kEl.value;

  const items=state.cats.map((c,i)=>`
    <div class="cat-item">
      <div class="cat-dot" style="background:${c.color}"></div>
      <span style="font-size:16px">${c.icon||'📌'}</span>
      <span class="cat-name">${esc(c.label)}</span>
      <span class="cat-key">${esc(c.key)}</span>
      <button class="btn btn-danger btn-sm" onclick="removeCat(${i})">삭제</button>
    </div>`).join('');

  const colorOpts=COLORS.map(col=>`<div class="color-opt${state.draft.color===col?' selected':''}" style="background:${col}" onclick="pickColor('${col}')"></div>`).join('');
  const iconOpts=ICONS.map(ic=>`<div class="icon-opt${state.draft.icon===ic?' selected':''}" onclick="pickIcon('${ic}')">${ic}</div>`).join('');

  openModal(`
    <div class="modal-title">🏷️ 카테고리 관리</div>
    <div class="cat-list">${items||'<div style="text-align:center;color:var(--txt3);font-size:13px;padding:1rem">카테고리가 없어요</div>'}</div>
    <hr class="add-sep">
    <div class="section-label" style="margin-bottom:8px">새 카테고리 추가</div>
    <div class="row2" style="margin-bottom:10px">
      <div class="field" style="margin:0"><label>이름</label><input type="text" id="nLabel" placeholder="예: 기도제목" maxlength="10" value="${esc(state.draft.label)}"/></div>
      <div class="field" style="margin:0"><label>키 (영문)</label><input type="text" id="nKey" placeholder="예: prayer" maxlength="20" value="${esc(state.draft.key)}"/></div>
    </div>
    <div class="section-label">아이콘 선택 — 현재: ${state.draft.icon}</div>
    <div class="icon-picker" style="margin-bottom:10px">${iconOpts}</div>
    <div class="section-label">색상 선택</div>
    <div class="color-options" style="margin-bottom:4px">${colorOpts}</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">닫기</button>
      <button class="btn btn-sky" onclick="addCat()">추가하기</button>
    </div>`, true);
}

function pickColor(col){
  /* save current text before re-render */
  const lEl=document.getElementById('nLabel'),kEl=document.getElementById('nKey');
  if(lEl) state.draft.label=lEl.value;
  if(kEl) state.draft.key=kEl.value;
  state.draft.color=col; openCatManager();
}
function pickIcon(ic){
  const lEl=document.getElementById('nLabel'),kEl=document.getElementById('nKey');
  if(lEl) state.draft.label=lEl.value;
  if(kEl) state.draft.key=kEl.value;
  state.draft.icon=ic; openCatManager();
}
async function removeCat(i){
  if(state.cats.length<=1){toast('카테고리는 최소 1개 필요해요!');return;}
  const target = state.cats[i];
  if(state.categorySync){
    const { error } = await removeCategoryRemote(target.key);
    if(error){
      toast('카테고리 삭제에 실패했어요.');
      return;
    }
  }
  state.cats.splice(i,1);
  saveCats();
  toast('삭제했어요.');
  openCatManager();
  renderApp();
}

async function addCat(){
  const label=document.getElementById('nLabel')?.value?.trim();
  const key=document.getElementById('nKey')?.value?.trim().toLowerCase().replace(/\s+/g,'_');
  if(!label){toast('이름을 입력해 주세요!');return;}
  if(!key){toast('키를 입력해 주세요! (영문)');return;}
  if(state.cats.find(c=>c.key===key)){toast('이미 있는 키예요!');return;}
  const newCat = {key,label,icon:state.draft.icon,color:state.draft.color};

  if(state.categorySync){
    const { error } = await createCategoryRemote(newCat);
    if(error){
      toast('카테고리 추가에 실패했어요.');
      return;
    }
  }

  state.cats.push(newCat);
  saveCats();
  toast(`"${state.draft.icon} ${label}" 추가됐어요!`);
  state.draft={label:'',key:'',color:COLORS[0],icon:ICONS[0]};
  openCatManager();
  renderApp();
}

/* ── More menu (card) ── */
function toggleMore(e, postId){
  e.stopPropagation();
  const wrap = document.getElementById('mw-'+postId);
  if(!wrap) return;
  const existing = wrap.querySelector('.more-menu');
  /* close all other open menus */
  document.querySelectorAll('.more-menu').forEach(m=>{ if(m!==existing) m.remove(); });
  if(existing){ existing.remove(); return; }
  const menu = document.createElement('div');
  menu.className = 'more-menu';
  menu.innerHTML = `
    <button class="more-menu-item" onclick="openEditPost(${postId});closeMoreMenus()">✏️ 수정</button>
    <button class="more-menu-item danger" onclick="confirmDelete(${postId});closeMoreMenus()">🗑️ 삭제</button>`;
  wrap.appendChild(menu);
}
function closeMoreMenus(){ document.querySelectorAll('.more-menu').forEach(m=>m.remove()); }
document.addEventListener('click', closeMoreMenus);

/* ── Admin Auth ── */
function openAdminLogin(){
  openModal(`<div class="modal-title">🔑 관리자 로그인</div>
    <div class="field"><label>비밀번호</label>
      <input type="password" id="adminPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')tryLogin()" />
    </div>
    <div class="error-msg" id="loginErr">비밀번호가 올바르지 않아요.</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-sky" onclick="tryLogin()">로그인</button>
    </div>
    <div class="hint-box">관리자 전용 비밀번호를 입력하세요.</div>`);
  setTimeout(()=>document.getElementById('adminPw')?.focus(),50);
}
async function tryLogin(){
  const pw=document.getElementById('adminPw')?.value;
  if(pw===ADMIN_PW){
    state.isAdmin=true; sessionStorage.setItem('isAdmin','true');
    closeModal(); toast('관리자로 로그인했어요 👑'); await fetchAll();
  } else {
    const err=document.getElementById('loginErr'); if(err)err.style.display='block';
  }
}
function logout(){
  state.isAdmin=false; sessionStorage.removeItem('isAdmin');
  if(state.activeTab==='secret')state.activeTab='all';
  toast('로그아웃됐어요.'); fetchAll();
}

/* ── Modal ── */
function openModal(html, large=false, xl=false){
  document.getElementById('modalArea').innerHTML=
    `<div class="modal-backdrop" onclick="handleBd(event)"><div class="modal${xl?' modal-xl':large?' modal-lg':''}">${html}</div></div>`;
}
function closeModal(){ document.getElementById('modalArea').innerHTML=''; }
function handleBd(e){ if(e.target===e.currentTarget)closeModal(); }

/* ── Init ── */
fetchAll();
</script>
